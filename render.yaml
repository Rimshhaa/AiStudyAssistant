services:
  - type: web
    name: AiStudyAssistant
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-learning-db
          property: connectionString

databases:
  - name: ai-learning-db
    databaseName: ai_study_assistant
    plan: free
